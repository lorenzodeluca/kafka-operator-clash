# This rule is not used by the project kubebuilder-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the messaging.lorenzodeluca.it.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubebuilder-operator
    app.kubernetes.io/managed-by: kustomize
  name: datastream-editor-role
rules:
- apiGroups:
  - messaging.lorenzodeluca.it
  resources:
  - datastreams
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - messaging.lorenzodeluca.it
  resources:
  - datastreams/status
  verbs:
  - get
