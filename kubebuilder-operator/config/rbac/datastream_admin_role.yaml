# This rule is not used by the project kubebuilder-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over messaging.lorenzodeluca.it.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubebuilder-operator
    app.kubernetes.io/managed-by: kustomize
  name: datastream-admin-role
rules:
- apiGroups:
  - messaging.lorenzodeluca.it
  resources:
  - datastreams
  verbs:
  - '*'
- apiGroups:
  - messaging.lorenzodeluca.it
  resources:
  - datastreams/status
  verbs:
  - get
