apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xdatastreams.messaging.lorenzodeluca.it
  labels:
    provider: mixed
spec:
  compositeTypeRef:
    apiVersion: messaging.lorenzodeluca.it/v1alpha1
    kind: XDataStream
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: kafka-topic
          base:
          apiVersion: topic.kafka.crossplane.io/v1alpha1
          kind: Topic
          spec:
            providerConfigRef:
              name: kafka-default
            forProvider:
              partitions: 1
              replicationFactor: 1
          patches:
          - type: FromCompositeFieldPath
          fromFieldPath: spec.topicName
          toFieldPath: metadata.name
          - type: FromCompositeFieldPath
          fromFieldPath: spec.partitions
          toFieldPath: spec.forProvider.partitions
          - type: FromCompositeFieldPath
          fromFieldPath: spec.replicationFactor
          toFieldPath: spec.forProvider.replicationFactor

          - name: connection-configmap
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: kubernetes-default
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      namespace: default
                      name: placeholder
                    data:
                      KAFKA_BROKER: "kafka.kafka.svc.cluster.local:9092"
                      KAFKA_TOPIC: ""
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.topicName
                toFieldPath: spec.forProvider.manifest.metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-connection"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.topicName
                toFieldPath: spec.forProvider.manifest.data.KAFKA_TOPIC

          - name: consumer-deployment
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: kubernetes-default
                forProvider:
                  manifest:
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      namespace: default
                      name: placeholder
                    spec:
                      replicas: 1
                      selector:
                        matchLabels:
                          app: placeholder
                      template:
                        metadata:
                          labels:
                            app: placeholder
                        spec:
                          containers:
                            - name: consumer
                              image: alpine:3.20
                              command:
                                - sh
                                - -c
                                - 'echo "Broker=$KAFKA_BROKER Topic=$KAFKA_TOPIC"; sleep infinity'
                              envFrom:
                                - configMapRef:
                                    name: placeholder
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.topicName
                toFieldPath: spec.forProvider.manifest.metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-consumer"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.topicName
                toFieldPath: spec.forProvider.manifest.spec.selector.matchLabels.app
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-consumer"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.topicName
                toFieldPath: spec.forProvider.manifest.spec.template.metadata.labels.app
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-consumer"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.partitions
                toFieldPath: spec.forProvider.manifest.spec.replicas
              - type: FromCompositeFieldPath
                fromFieldPath: spec.topicName
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].envFrom[0].configMapRef.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-connection"
